<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="tabGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="35%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#FCE694" />
    </linearGradient>
    <linearGradient id="tabDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <filter id="tabGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Rounded Tab Badge Background -->
  <rect width="128" height="128" rx="28" fill="url(#tabDark)" />
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="url(#tabGold)" stroke-width="4" opacity="0.85" />

  <!-- Centered High-Contrast Interlocking MTG Monogram for Tab Icon -->
  <g filter="url(#tabGlow)" transform="translate(14, 18) scale(0.8)">
    <!-- Outer Diamond Frame -->
    <polygon points="62,4 116,58 62,112 8,58" fill="none" stroke="url(#tabGold)" stroke-width="8" stroke-linejoin="round" />
    
    <!-- Central T Pillar -->
    <path d="M36,32 L88,32 L88,44 L68,44 L68,88 L56,88 L56,44 L36,44 Z" fill="url(#tabGold)" />
    
    <!-- Interlocking M Wings -->
    <path d="M24,76 L24,40 L38,58 L52,40 L52,76 L44,76 L44,54 L38,64 L32,54 L32,76 Z" fill="#FFFFFF" opacity="0.95" />
    <path d="M72,76 L72,40 L86,58 L100,40 L100,76 L92,76 L92,54 L86,64 L80,54 L80,76 Z" fill="#FFFFFF" opacity="0.95" />

    <!-- G Accent Curve -->
    <path d="M62,96 C44,96 32,84 32,66 L42,66 C42,78 50,86 62,86 C74,86 82,78 82,68 L70,68 L70,58 L92,58 L92,72 C88,86 76,96 62,96 Z" fill="url(#tabGold)" />
  </g>
</svg>
