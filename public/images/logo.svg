<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2A1" />
      <stop offset="35%" stop-color="#FFD700" />
      <stop offset="70%" stop-color="#DAA520" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#FFD700" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Geometric Luxury Diamond Crest for MTG -->
  <g transform="translate(15, 10)" filter="url(#glow)">
    <!-- Outer Diamond Border -->
    <polygon points="60,5 115,60 60,115 5,60" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linejoin="round"/>
    <!-- Inner Accent Diamond -->
    <polygon points="60,15 105,60 60,105 15,60" fill="#0D0D0D" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6"/>
    
    <!-- Bold Monogram M T G inside Crest -->
    <!-- M -->
    <path d="M 32,82 L 32,45 L 45,65 L 58,45 L 58,82" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- T -->
    <path d="M 52,43 L 78,43 M 65,43 L 65,82" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
    <!-- G -->
    <path d="M 88,52 C 82,44 72,44 72,63 C 72,78 82,82 88,78 L 88,68 L 80,68" fill="none" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand Typography -->
  <g transform="translate(145, 62)">
    <!-- Main Brand Name -->
    <text x="0" y="8" font-family="'Arial Black', 'Montserrat', sans-serif" font-size="34" font-weight="900" letter-spacing="4" fill="url(#silverGrad)">MOHIT</text>
    <text x="145" y="8" font-family="'Arial Black', 'Montserrat', sans-serif" font-size="34" font-weight="900" letter-spacing="4" fill="url(#goldGrad)">TILES</text>
    
    <!-- Divider Line -->
    <line x1="0" y1="22" x2="280" y2="22" stroke="url(#goldGrad)" stroke-width="2" stroke-opacity="0.7"/>
    
    <!-- Subtitle / Tagline -->
    <text x="0" y="44" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="700" letter-spacing="6.5" fill="#CCCCCC">&amp; GRANITES</text>
  </g>
</svg>
